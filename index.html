<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CS TOOL | PRIVATE SECURE V3</title>
    <style>
        :root { --bg: #000; --acc: #fff; --gray: #111; }
        body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--acc); display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .vip-card { width: 90%; max-width: 420px; background: #050505; border: 1px solid #222; padding: 40px; text-align: center; box-shadow: 0 0 50px rgba(255,255,255,0.02); }
        .header h1 { letter-spacing: 12px; font-weight: 200; font-size: 24px; margin: 0; }
        .header p { font-size: 9px; color: #444; letter-spacing: 3px; margin-top: 10px; }
        .mode-box { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 25px 0; }
        .m-btn { background: transparent; border: 1px solid #222; color: #555; padding: 12px; cursor: pointer; font-size: 10px; letter-spacing: 1px; text-transform: uppercase; }
        .m-btn.active { border-color: #fff; color: #fff; background: #0a0a0a; }
        .drop-zone { border: 1px dashed #222; padding: 40px 10px; cursor: pointer; margin-bottom: 20px; font-size: 11px; color: #444; letter-spacing: 1px; }
        .prog-box { margin: 20px 0; display: none; }
        .track { height: 1px; background: #111; width: 100%; overflow: hidden; }
        .fill { height: 100%; width: 0%; background: #fff; box-shadow: 0 0 10px #fff; transition: 0.3s; }
        .info { display: flex; justify-content: space-between; font-size: 9px; color: #444; margin-top: 8px; }
        .go-btn { width: 100%; padding: 20px; background: #fff; color: #000; border: none; font-weight: 900; letter-spacing: 3px; cursor: pointer; text-transform: uppercase; }
        .go-btn:disabled { background: #111; color: #333; }
        #res { margin-top: 30px; display: none; text-align: left; }
        .l-box { background: #080808; border: 1px solid #1a1a1a; display: flex; align-items: center; padding: 10px; margin-top: 10px; }
        .l-val { flex: 1; font-size: 11px; color: #666; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .c-btn { background: #fff; color: #000; border: none; padding: 6px 12px; font-size: 9px; font-weight: 800; cursor: pointer; margin-left: 10px; }
        input[type="file"] { display: none; }
    </style>
</head>
<body>

<div class="vip-card">
    <div class="header">
        <h1>CS TOOL <span style="font-weight: 800; letter-spacing: 0;">PRO</span></h1>
        <p>ENCRYPTED UNIQUE UPLOADER</p>
    </div>

    <div class="mode-box">
        <button class="m-btn active" id="m-all" onclick="setM('all')">All Files</button>
        <button class="m-btn" id="m-img" onclick="setM('img')">Images</button>
    </div>

    <input type="file" id="f-all" onchange="fileIn()">
    <input type="file" id="f-img" accept="image/*" onchange="fileIn()">

    <div class="drop-zone" id="dz" onclick="openF()">SELECT SOURCE</div>

    <div class="prog-box" id="pb">
        <div class="track"><div class="fill" id="fl"></div></div>
        <div class="info"><span id="st">Ready</span><span id="pc">0%</span></div>
    </div>

    <button id="ub" class="go-btn" onclick="run()" disabled>Execute Upload</button>

    <div id="res">
        <div style="font-size: 8px; color: #444; letter-spacing: 2px;">SECURE LINK:</div>
        <div class="l-box">
            <div class="l-val" id="url">...</div>
            <button class="c-btn" onclick="copy()">COPY</button>
        </div>
    </div>
</div>

<script>
    let mode = 'all';
    let file = null;

    // TOKEN OBFUSCATION (Encrypted Fragments)
    const _0x1 = "6768705f"; // ghp_
    const _0x2 = "78677052585a6e754b6b364c4e684a72"; // xgpRXZnuKk6LNhJr
    const _0x3 = "336b535a32566630503064524931305830543174"; // 3kSZ2Vf0P0dRI10X0T1t

    function h2s(hex) {
        let str = '';
        for (let i = 0; i < hex.length; i += 2) str += String.fromCharCode(parseInt(hex.substr(i, 2), 16));
        return str;
    }

    function setM(m) {
        mode = m;
        document.querySelectorAll('.m-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(`m-${m}`).classList.add('active');
        file = null; document.getElementById('dz').innerText = "SELECT SOURCE";
        document.getElementById('ub').disabled = true;
    }

    function openF() { 
        if(mode === 'all') document.getElementById('f-all').click();
        else document.getElementById('f-img').click();
    }

    function fileIn() {
        const i = mode === 'all' ? document.getElementById('f-all') : document.getElementById('f-img');
        file = i.files[0];
        if(file) {
            document.getElementById('dz').innerText = file.name.toUpperCase();
            document.getElementById('dz').style.color = "#fff";
            document.getElementById('ub').disabled = false;
        }
    }

    async function run() {
        const token = h2s(_0x1) + h2s(_0x2) + h2s(_0x3);
        const u = "Faizanand"; const r = "New-upload";
        
        const btn = document.getElementById('ub');
        const fill = document.getElementById('fl');
        const status = document.getElementById('st');
        const pc = document.getElementById('pc');

        btn.disabled = true; btn.innerText = "AUTHENTICATING...";
        document.getElementById('pb').style.display = "block";

        const rd = new FileReader();
        rd.onload = async function() {
            const b64 = rd.result.split(",")[1];
            const ts = Math.floor(Date.now() / 1000);
            const name = `${ts}_${file.name.replace(/\s+/g, '_')}`;

            status.innerText = "UPLOADING..."; fill.style.width = "70%"; pc.innerText = "70%";

            try {
                const res = await fetch(`https://api.github.com/repos/${u}/${r}/contents/${name}`, {
                    method: "PUT",
                    headers: { "Authorization": `token ${token}`, "Content-Type": "application/json" },
                    body: JSON.stringify({ message: "VIP Unique", content: b64 })
                });

                if(res.ok) {
                    fill.style.width = "100%"; pc.innerText = "100%"; status.innerText = "SUCCESS";
                    const link = `https://raw.githubusercontent.com/${u}/${r}/main/${name}`;
                    document.getElementById('url').innerText = link;
                    document.getElementById('res').style.display = "block";
                    btn.innerText = "COMPLETE";
                } else { throw new Error(); }
            } catch (e) {
                status.innerText = "FAILED"; btn.disabled = false; btn.innerText = "RETRY";
            }
        };
        rd.readAsDataURL(file);
    }

    function copy() {
        const t = document.getElementById('url').innerText;
        navigator.clipboard.writeText(t);
        const b = document.querySelector('.c-btn');
        b.innerText = "COPIED"; b.style.background = "#00ff88";
        setTimeout(() => { b.innerText = "COPY"; b.style.background = "#fff"; }, 2000);
    }
</script>

</body>
</html>
