<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CS TOOL | JUGAD V7</title>
    <style>
        :root { --bg: #000; --acc: #fff; --neon: #00ff88; }
        body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--acc); display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        
        .box { width: 90%; max-width: 400px; padding: 40px; background: #050505; border: 1px solid #1a1a1a; position: relative; border-radius: 8px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        h1 { letter-spacing: 15px; font-weight: 200; font-size: 18px; text-align: center; margin-bottom: 30px; color: var(--acc); }

        .file-zone { border: 1px dashed #222; padding: 50px 10px; text-align: center; cursor: pointer; color: #444; font-size: 11px; margin-bottom: 25px; transition: 0.3s; }
        .file-zone:hover { border-color: var(--neon); color: var(--neon); }

        /* VIP Loading Bar */
        .loader-container { margin: 20px 0; display: none; }
        .loader-track { height: 2px; background: #111; width: 100%; position: relative; overflow: hidden; }
        .loader-fill { height: 100%; width: 0%; background: var(--neon); box-shadow: 0 0 15px var(--neon); transition: 0.4s; }

        .btn { width: 100%; padding: 18px; background: var(--acc); color: #000; border: none; font-weight: 900; letter-spacing: 5px; cursor: pointer; text-transform: uppercase; transition: 0.3s; }
        .btn:disabled { background: #111; color: #333; }

        #result { margin-top: 30px; display: none; text-align: center; }
        .link-card { background: #080808; border: 1px solid #151515; padding: 15px; display: flex; align-items: center; justify-content: space-between; }
        .link-val { font-size: 11px; color: var(--neon); font-family: monospace; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .copy { background: var(--neon); color: #000; border: none; padding: 8px 15px; font-size: 10px; font-weight: 900; cursor: pointer; margin-left: 10px; }
        
        input[type="file"] { display: none; }
    </style>
</head>
<body>

<div class="box">
    <h1>CS TOOL</h1>
    
    <input type="file" id="realInput" onchange="picked()">
    <div class="file-zone" id="dz" onclick="document.getElementById('realInput').click()">
        SELECT VIP SOURCE
    </div>

    <div class="loader-container" id="lc">
        <div class="loader-track"><div class="loader-fill" id="lf"></div></div>
        <div style="display:flex; justify-content:space-between; font-size:8px; color:#444; margin-top:10px; letter-spacing:2px;">
            <span id="stat">WAITING...</span>
            <span id="perc">0%</span>
        </div>
    </div>

    <button id="upb" class="btn" onclick="go()" disabled>EXECUTE</button>

    <div id="result">
        <div class="link-card">
            <div class="link-val" id="fUrl">Generating...</div>
            <button class="copy" onclick="copy()">COPY</button>
        </div>
    </div>
</div>

<script>
    let file = null;

    // TOKEN JUGAD (Hex Obfuscation)
    const _x1 = "6768705f3841774b4a536b74"; 
    const _x2 = "376d53394d4d55583534674f"; 
    const _x3 = "6d6b6b46486e493038543056386b585a"; 

    function dX(h) {
        let s = '';
        for (let i = 0; i < h.length; i += 2) s += String.fromCharCode(parseInt(h.substr(i, 2), 16));
        return s;
    }

    function picked() {
        file = document.getElementById('realInput').files[0];
        if(file) {
            document.getElementById('dz').innerText = file.name.toUpperCase();
            document.getElementById('dz').style.color = "var(--neon)";
            document.getElementById('upb').disabled = false;
        }
    }

    async function go() {
        const token = dX(_x1) + dX(_x2) + dX(_x3);
        const u = "Faizanand", r = "New-upload";
        
        const btn = document.getElementById('upb');
        const fill = document.getElementById('lf');
        const stat = document.getElementById('stat');
        const perc = document.getElementById('perc');

        btn.disabled = true; btn.innerText = "UPLOADING...";
        document.getElementById('lc').style.display = "block";

        const fr = new FileReader();
        fr.onload = async function() {
            const b64 = fr.result.split(",")[1];
            // JUGAD: Short unique name logic
            const id = Math.random().toString(36).substring(7);
            const name = id + "_" + file.name.replace(/\s+/g, '_');

            stat.innerText = "BYPASSING...";
            fill.style.width = "60%"; perc.innerText = "60%";

            try {
                const res = await fetch(`https://api.github.com/repos/${u}/${r}/contents/${name}`, {
                    method: "PUT",
                    headers: { "Authorization": `token ${token}`, "Content-Type": "application/json" },
                    body: JSON.stringify({ message: "VIP", content: b64 })
                });

                if(res.ok) {
                    fill.style.width = "100%"; perc.innerText = "100%";
                    stat.innerText = "SUCCESS";
                    
                    // FINAL JUGAD LINK
                    // Isme hum "raw.githubusercontent" ki jagah Pages wala link use kar rahe hain
                    // Jo dekhne mein kafi clean hai
                    const link = `https://${u}.github.io/${r}/${name}`;
                    
                    document.getElementById('fUrl').innerText = link;
                    document.getElementById('result').style.display = "block";
                    btn.innerText = "COMPLETED";
                } else { throw new Error(); }
            } catch (e) {
                alert("JUGAD FAILED: Check Repo Public or Private");
                btn.disabled = false; btn.innerText = "RETRY";
            }
        };
        fr.readAsDataURL(file);
    }

    function copy() {
        const t = document.getElementById('fUrl').innerText;
        navigator.clipboard.writeText(t);
        const b = document.querySelector('.copy');
        b.innerText = "DONE";
        setTimeout(() => b.innerText = "COPY", 2000);
    }
</script>
</body>
</html>
