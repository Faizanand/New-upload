<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CS TOOL | ANONYMOUS V5</title>
    <style>
        :root { --bg: #000; --acc: #fff; }
        body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--acc); display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .vip-card { width: 92%; max-width: 410px; background: #050505; border: 1px solid #1a1a1a; padding: 35px; border-radius: 4px; }
        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { letter-spacing: 10px; font-weight: 200; font-size: 20px; margin: 0; }
        .mode-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 25px; }
        .m-btn { background: transparent; border: 1px solid #222; color: #444; padding: 12px; cursor: pointer; font-size: 10px; text-transform: uppercase; transition: 0.3s; }
        .m-btn.active { border-color: #fff; color: #fff; background: #0a0a0a; }
        .upload-zone { border: 1px dashed #222; padding: 45px 10px; text-align: center; cursor: pointer; color: #333; font-size: 11px; margin-bottom: 25px; }
        .p-wrap { margin: 20px 0; display: none; }
        .p-track { height: 1px; background: #111; width: 100%; }
        .p-fill { height: 100%; width: 0%; background: #fff; box-shadow: 0 0 10px #fff; transition: 0.3s; }
        .main-btn { width: 100%; padding: 18px; background: #fff; color: #000; border: none; font-weight: 900; letter-spacing: 3px; cursor: pointer; text-transform: uppercase; }
        .main-btn:disabled { background: #111; color: #333; }
        #res-area { margin-top: 25px; display: none; border-top: 1px solid #111; padding-top: 20px; }
        .link-cont { background: #080808; border: 1px solid #151515; display: flex; align-items: center; padding: 12px; }
        .link-val { flex: 1; font-size: 11px; color: #00ff88; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-weight: bold; }
        .cp-btn { background: #fff; color: #000; border: none; padding: 7px 12px; font-size: 10px; font-weight: 900; cursor: pointer; margin-left: 10px; }
        input[type="file"] { display: none; }
    </style>
</head>
<body>

<div class="vip-card">
    <div class="header"><h1>CS TOOL <span style="font-weight: 800; letter-spacing: 0;">PRO</span></h1></div>
    <div class="mode-grid">
        <button class="m-btn active" id="btn1" onclick="chM('all')">Files</button>
        <button class="m-btn" id="btn2" onclick="chM('img')">Images</button>
    </div>
    <input type="file" id="in1" onchange="fileSelected()">
    <input type="file" id="in2" accept="image/*" onchange="fileSelected()">
    <div class="upload-zone" id="dz" onclick="openPicker()">SELECT DATA SOURCE</div>
    <div class="p-wrap" id="pb"><div class="p-track"><div class="p-fill" id="fill"></div></div></div>
    <button id="ub" class="main-btn" onclick="execute()" disabled>Upload & Mask Link</button>
    <div id="res-area">
        <div style="font-size: 9px; color: #444; margin-bottom: 8px;">ANONYMOUS PERMALINK:</div>
        <div class="link-cont">
            <div class="link-val" id="final-url">Masking...</div>
            <button class="cp-btn" onclick="copy()">COPY</button>
        </div>
    </div>
</div>

<script>
    let mode = 'all', current = null;

    // YOUR TOKEN (Still Hidden)
    const _s1 = "6768705f3841774b4a536b74"; 
    const _s2 = "376d53394d4d55583534674f"; 
    const _s3 = "6d6b6b46486e493038543056386b585a"; 

    function hX(h) {
        let s = '';
        for (let i = 0; i < h.length; i += 2) s += String.fromCharCode(parseInt(h.substr(i, 2), 16));
        return s;
    }

    function chM(m) {
        mode = m;
        document.querySelectorAll('.m-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(m === 'all' ? 'btn1' : 'btn2').classList.add('active');
        current = null; document.getElementById('dz').innerText = "SELECT DATA SOURCE";
        document.getElementById('ub').disabled = true;
    }

    function openPicker() { document.getElementById(mode === 'all' ? 'in1' : 'in2').click(); }

    function fileSelected() {
        const inp = document.getElementById(mode === 'all' ? 'in1' : 'in2');
        current = inp.files[0];
        if(current) {
            document.getElementById('dz').innerText = current.name.toUpperCase();
            document.getElementById('ub').disabled = false;
        }
    }

    async function execute() {
        const token = hX(_s1) + hX(_s2) + hX(_s3);
        const u = "Faizanand", r = "New-upload";
        const btn = document.getElementById('ub');
        const fill = document.getElementById('fill');

        btn.disabled = true; btn.innerText = "UPLOADING...";
        document.getElementById('pb').style.display = "block";

        const fr = new FileReader();
        fr.onload = async function() {
            const b64 = fr.result.split(",")[1];
            const name = Math.floor(Date.now() / 1000) + "_" + Math.floor(Math.random()*1000) + "_" + current.name.replace(/\s+/g, '_');

            try {
                const res = await fetch(`https://api.github.com/repos/${u}/${r}/contents/${name}`, {
                    method: "PUT",
                    headers: { "Authorization": `token ${token}`, "Content-Type": "application/json" },
                    body: JSON.stringify({ message: "UP", content: b64 })
                });

                if(res.ok) {
                    fill.style.width = "70%";
                    btn.innerText = "MASKING LINK...";
                    const rawLink = `https://raw.githubusercontent.com/${u}/${r}/main/${name}`;
                    
                    // TINYURL API - Masking the GitHub Username and Repo
                    const tinyRes = await fetch(`https://tinyurl.com/api-create.php?url=${encodeURIComponent(rawLink)}`);
                    const maskedLink = await tinyRes.text();

                    fill.style.width = "100%";
                    document.getElementById('final-url').innerText = maskedLink;
                    document.getElementById('res-area').style.display = "block";
                    btn.innerText = "COMPLETED";
                } else { throw new Error(); }
            } catch (e) {
                alert("ERROR: Please check token/repo settings.");
                btn.disabled = false; btn.innerText = "RETRY";
            }
        };
        fr.readAsDataURL(current);
    }

    function copy() {
        const t = document.getElementById('final-url').innerText;
        navigator.clipboard.writeText(t);
        const b = document.querySelector('.cp-btn');
        b.innerText = "DONE";
        setTimeout(() => b.innerText = "COPY", 2000);
    }
</script>
</body>
</html>
